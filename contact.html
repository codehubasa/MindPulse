<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MindPulse Terminal</title>
    <!-- Tailwind CSS for layout structure -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for matching terminal iconography -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #02080d;
            background-image: 
                linear-gradient(to bottom, rgba(2, 8, 13, 0.88) 0%, rgba(5, 16, 26, 0.94) 100%),
                url('https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?auto=format&fit=crop&w=1920&q=90');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
        }
        .glass-panel-3d {
            background: rgba(8, 20, 32, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">

    <header class="bg-slate-950/75 backdrop-blur-xl border-b border-slate-900 sticky top-0 z-50 px-8 py-4 flex items-center justify-between">
        <a href="index.html#page-1" class="flex items-center gap-3 cursor-pointer" style="text-decoration: none;">
            <div class="bg-gradient-to-tr from-cyan-400 to-emerald-400 p-2 rounded-xl text-slate-950 text-lg shadow-lg shadow-cyan-400/20">
                <i class="fas fa-wave-square"></i>
            </div>
            <span class="font-black text-xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-cyan-400">MindPulse</span>
        </a>
        <nav class="hidden md:flex items-center gap-6 text-xs font-bold tracking-wide uppercase text-slate-400">
            <a href="index.html#page-1" class="hover:text-cyan-400 transition">Home</a>
            <a href="dashboard.html" class="hover:text-cyan-400 transition">Dashboard</a>
            <a href="index.html#page-7" class="hover:text-cyan-400 transition">Login</a>
            <a href="about.html" class="hover:text-cyan-400 transition">About Us</a>
            <a href="FAQ.html" class="hover:text-cyan-400 transition">FAQ</a>
            <a href="contact.html" class="hover:text-cyan-400 text-cyan-400 transition">Contact Us</a>
            <a href="feedback.html" class="hover:text-cyan-400 transition">Feedback</a>
            <a href="policy.html" class="hover:text-cyan-400 transition">Policy & Terms</a>
        </nav>
    </header>

    <main class="w-full max-w-2xl mx-auto py-12 px-6 flex-grow flex flex-col justify-center space-y-10">
        
        <div class="text-center space-y-3">
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-cyan-950/70 border border-cyan-800/40 rounded-full text-xs text-cyan-400 font-semibold tracking-wide">
                <i class="fas fa-headset animate-pulse"></i> Communication Relays
            </div>
            <h2 class="text-4xl md:text-5xl font-black text-white tracking-tight">Contact Us</h2>
            <p class="text-slate-400 text-xs md:text-sm max-w-xl mx-auto font-light">
                Establish a direct uplink with our core operations team for system inquiries, API scaling requests, or deployment support.
            </p>
        </div>

        <!-- Single Centered Contact Form -->
        <form onsubmit="event.preventDefault();" class="w-full glass-panel-3d p-8 rounded-2xl space-y-4 text-xs">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-slate-400 font-semibold uppercase tracking-wider">User Name</label>
                    <input type="text" placeholder="Identity" class="w-full bg-slate-950/80 border border-slate-800 focus:border-cyan-500 rounded-xl py-3 px-4 text-white focus:outline-none transition">
                </div>
                <div class="space-y-1">
                    <label class="text-slate-400 font-semibold uppercase tracking-wider">Email ID (Email)</label>
                    <input type="email" placeholder="operator@domain.com" class="w-full bg-slate-950/80 border border-slate-800 focus:border-cyan-500 rounded-xl py-3 px-4 text-white focus:outline-none transition">
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-slate-400 font-semibold uppercase tracking-wider">Transmission Subject</label>
                <input type="text" placeholder="Core Subject Block" class="w-full bg-slate-950/80 border border-slate-800 focus:border-cyan-500 rounded-xl py-3 px-4 text-white focus:outline-none transition">
            </div>
            <div class="space-y-1">
                <label class="text-slate-400 font-semibold uppercase tracking-wider">Message To Be Sent</label>
                <textarea rows="5" placeholder="Type your data transmission payload here..." class="w-full bg-slate-950/80 border border-slate-800 focus:border-cyan-500 rounded-xl py-3 px-4 text-white focus:outline-none transition resize-none"></textarea>
            </div>
            <button class="w-full bg-gradient-to-r from-cyan-400 to-emerald-400 text-slate-950 py-3.5 rounded-xl font-black uppercase tracking-widest active:scale-[0.98] transition-transform shadow-lg shadow-cyan-400/10">
                Dispatch Transmission
            </button>
        </form>
    </main>

</body>
</html>
